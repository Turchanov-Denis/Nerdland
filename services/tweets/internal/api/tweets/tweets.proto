syntax = "proto3";

package tweets;

option go_package = "tweets/internal/api/tweets;pb";

service TweetService {
  rpc CreateTweet(CreateTweetRequest) returns (TweetResponse);
}

message CreateTweetRequest {
  int64 account_id = 1;
  string text = 2;
}

message TweetResponse {
  int64 id = 1;
  int64 account_id = 2;
  string text = 3;
}